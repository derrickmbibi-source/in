<!DOCTYPE html>

<html lang="en">


<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <title>Login/Signup</title>

</head>


<body>
    <center>

    <div class="container">

        <h1>Login</h1>

        <form action="login.html" method="post">
            <div class="input-group">
            
            <input type="email" name="email" id="email" required placeholder="Email Address">

            <br>
            
            <input type="password" name="password" id="password" required placeholder="Password">
            
            </div>


            <br>
            <div class="remember">

            <div class="checkbox"><input type="checkbox" name="checkbox" id="checkbox"></div>
            <label for="checkbox">Remember me</label>
            <span class="link"><a href="login.html">Forgot Password?</a></span>

             

            </div>

            <br>

            <button type="submit" class="btn">Login</button>

            <p class="member">Not a member? <span class="link"><a href="login.html">Sign up now</a></span></p>

        </form>

        </div>
    </center>
    
</body>


</html>
